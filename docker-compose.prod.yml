version: '3.8'

services:
  # MongoDB Database - Production
  mongo:
    image: mongo:latest
    container_name: pawcare_mongo_prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: pawcare
    ports:
      - "127.0.0.1:27017:27017"  # Only accessible from localhost
    volumes:
      - mongo_data_prod:/data/db
      - mongo_config_prod:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawcare_network_prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API - Production
  backend:
    image: ${DOCKER_USERNAME:-yourusername}/pawcare-backend:latest
    container_name: pawcare_backend_prod
    restart: always
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongo:27017/pawcare?authSource=admin
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRE=1h
      - JWT_REFRESH_EXPIRE=7d
      - PORT=5000
      - FRONTEND_URL=${FRONTEND_URL:-https://pawcare.example.com}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    ports:
      - "127.0.0.1:5000:5000"  # Only accessible from localhost, nginx will proxy
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pawcare_network_prod
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend React - Production
  frontend:
    image: ${DOCKER_USERNAME:-yourusername}/pawcare-frontend:latest
    container_name: pawcare_frontend_prod
    restart: always
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://api.pawcare.example.com}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pawcare_network_prod
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy - Production
  nginx:
    image: nginx:alpine
    container_name: pawcare_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro  # SSL certificate
      - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro    # SSL key
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pawcare_network_prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Networks
networks:
  pawcare_network_prod:
    driver: bridge

# Volumes cho persistence
volumes:
  mongo_data_prod:
    driver: local
  mongo_config_prod:
    driver: local
  nginx_logs:
    driver: local
