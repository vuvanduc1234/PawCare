name: CI - Build & Test

# Trigger khi push hoặc PR vào dev và main
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # Job 1: Lint & Test Frontend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 🔧 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🧪 Run lint (nếu có)
        working-directory: ./frontend
        run: npm run lint --if-present || true

      - name: 🏗️ Build frontend
        working-directory: ./frontend
        run: npm run build

  # Job 2: Test Backend
  test-backend:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: 🔧 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🧪 Run tests
        working-directory: ./backend
        env:
          MONGODB_URI: mongodb://testuser:testpass@localhost:27017/pawcare_test?authSource=admin
          JWT_ACCESS_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh
        run: npm test --if-present || echo "No tests found"

      - name: 🏗️ Build backend
        working-directory: ./backend
        run: npm run build --if-present || true

  # Job 3: Build & Push Docker Images
  build-docker:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pawcare-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/pawcare-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pawcare-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pawcare-backend:buildcache,mode=max

      - name: 🏗️ Build & Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pawcare-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/pawcare-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pawcare-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pawcare-frontend:buildcache,mode=max

      - name: ✅ Build Complete
        run: echo "✓ Docker images built and pushed successfully"
