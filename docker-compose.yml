version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:latest
    container_name: pawcare_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
    networks:
      - pawcare_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pawcare_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongo:27017/pawcare?authSource=admin
      - NODE_ENV=development
      - JWT_ACCESS_SECRET=your_access_secret
      - JWT_REFRESH_SECRET=your_refresh_secret
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - pawcare_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pawcare_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - pawcare_network
    restart: unless-stopped

# Networks
networks:
  pawcare_network:
    driver: bridge

# Volumes
volumes:
  mongo_data:
    driver: local
